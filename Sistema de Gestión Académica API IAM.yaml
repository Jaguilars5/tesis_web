      summary: Iniciar sesión
      tags:
      - iam
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: Indica si la operación fue exitosa
                  data:
                    $ref: '#/components/schemas/LoginResponse'
                  msg:
                    type: string
                    description: Mensaje informativo o de error
                required:
                - ok
                - data
                - msg
          description: ''
