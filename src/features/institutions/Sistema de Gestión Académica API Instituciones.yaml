      operationId: academic_grades_list
      description: ViewSet base para modelos de instituciones con soporte de StandardResponse
      summary: Listar grados académicos
      parameters:
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Número de resultados a devolver por página.
        schema:
          type: integer
      tags:
      - institutions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: Indica si la operación fue exitosa
                  data:
                    $ref: '#/components/schemas/PaginatedAcademicGradeList'
                  msg:
                    type: string
                    description: Mensaje informativo o de error
                required:
                - ok
                - data
                - msg
          description: ''
    post:
      operationId: academic_grades_create
      description: ViewSet base para modelos de instituciones con soporte de StandardResponse
      summary: Crear grado académico
      tags:
