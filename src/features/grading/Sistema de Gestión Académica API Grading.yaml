openapi: 3.0.3
info:
  title: Sistema de Gestión Académica API
  version: 1.0.0
  description: |2

    API RESTful para la gestión académica de instituciones educativas.

    ## Autenticación
    Todos los endpoints (excepto login y refresh) requieren:
    ```
    Authorization: Bearer <access_token>
    ```

    ## Formato de Respuesta
    Todas las respuestas siguen el formato:
    ```json
    {
      "ok": true,
      "data": {},
      "msg": ""
    }
    ```

    ## Códigos de Error
    - 401: No autenticado
    - 403: Sin permiso
    - 404: No encontrado
    - 422: Error de validación
    - 429: Rate limit excedido
