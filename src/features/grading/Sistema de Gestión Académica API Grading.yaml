components:
  schemas:
    ActivityType:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          title: Código
          maxLength: 20
        name:
          type: string
          title: Nombre
          maxLength: 100
        description:
          type: string
          title: Descripción
        is_active:
          type: boolean
          title: Activo
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Orden
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - name
      - updated_at
    ActivityTypeRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          title: Código
          maxLength: 20
        name:
          type: string
          minLength: 1
          title: Nombre
          maxLength: 100
        description:
          type: string
          title: Descripción
        is_active:
          type: boolean
          title: Activo
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Orden
      required:
      - code
      - name
    BlockComponent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        evaluation_block_name:
          type: string
          readOnly: true
        name:
          type: string
          title: Nombre
          maxLength: 100
        internal_weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          title: Ponderación Interna (%)
          description: Peso del componente dentro del bloque de evaluación
        evaluation_block:
          type: integer
          title: Bloque de Evaluación
      required:
      - evaluation_block
      - evaluation_block_name
      - id
      - internal_weight
      - name
    BlockComponentRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          title: Nombre
          maxLength: 100
        internal_weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          title: Ponderación Interna (%)
          description: Peso del componente dentro del bloque de evaluación
        evaluation_block:
          type: integer
          title: Bloque de Evaluación
      required:
      - evaluation_block
      - internal_weight
      - name
    ComponentIndicator:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        block_component_name:
          type: string
          readOnly: true
